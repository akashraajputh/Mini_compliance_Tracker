version: '3.8'

services:
  client:
    build: ./client
    ports:
      - "3000:3000"
    depends_on:
      - server
    environment:
      - NEXT_PUBLIC_API_URL=http://server:3001/api

  server:
    build: ./server
    ports:
      - "3001:3001"
    volumes:
      - ./server/database.db:/app/database.db
      - ./server/database.json:/app/database.json